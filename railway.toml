[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npm install --include=dev --prefix client && npm run build --prefix client"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[variables]
NODE_VERSION = "20"
